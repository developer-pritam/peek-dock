name: PeekDock
options:
  bundleIdPrefix: in.developerpritam
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true

targets:
  PeekDock:
    type: application
    platform: macOS
    sources:
      - path: WindowManager
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.developerpritam.peekdock
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.10"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""          # fill in your 10-char Team ID from developer.apple.com
        CODE_SIGN_IDENTITY: "-"
        INFOPLIST_FILE: WindowManager/App/Info.plist
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @executable_path/../Frameworks
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_ENTITLEMENTS: WindowManager/App/WindowManager.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: WindowManager/App/WindowManager.entitlements
      properties:
        com.apple.security.app-sandbox: false
    info:
      path: WindowManager/App/Info.plist
      properties:
        CFBundleName: PeekDock
        CFBundleDisplayName: PeekDock
        CFBundleIdentifier: in.developerpritam.peekdock
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSUIElement: true
        NSScreenCaptureUsageDescription: "PeekDock needs screen recording permission to capture window previews."
        NSAppleEventsUsageDescription: "PeekDock needs Apple Events access to manage windows."
    postBuildScripts: []
